# Autonomous Learner Configuration

## Learning Sources

Configure sources to learn from:

```yaml
sources:
  - name: "项目文档"
    type: directory
    path: "docs/"
    categories: [business, tech]

  - name: "技术博客"
    type: rss
    url: ""
    categories: [tech, market]
```

## Categories

| Category | Description | Priority |
|----------|-------------|----------|
| business | 业务知识 | high |
| data | 数据分析 | high |
| planning | 策划方案 | medium |
| tech | 技术文档 | high |
| market | 市场和竞品 | medium |

## Schedule

- daily-learn: 每天 09:00
- weekly-summarize: 每周一 09:00
- update-index: 每天 00:00
