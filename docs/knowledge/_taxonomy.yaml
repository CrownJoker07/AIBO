# 知识分类体系配置
# 本文件定义知识库的分类结构，供 autonomous-learner skill 读取使用
# 添加新分类或修改结构时，只需更新此文件，无需修改 skill

顶级分类:
  产品:
    描述: 游戏设计、用户体验
    子目录: [游戏设计, 用户研究]

  运营:
    描述: 用户增长、留存、社区、活动
    子目录: [用户获取, 用户留存, 社区运营, 活动运营]

  商业化:
    描述: 变现、广告、归因、定价
    子目录: [变现, 广告, 归因, 定价]

  数据:
    描述: 分析、BI、数据科学
    子目录: [数据分析, BI, 数据科学]

  技术:
    描述: 开发、AI、算法、运维
    子目录: [开发, AI技术, 算法, 运维]

  质量:
    描述: QA、安全
    子目录: [QA, 安全]

  商务:
    描述: 发行、市场
    子目录: [发行, 市场]

  行业:
    描述: 市场研究、战略
    子目录: [行业动态, 行业资源]

文件命名规则:
  格式: "{YYYY-MM-DD}-{中文标题}.md"
  标题长度: 20字以内
  去除字符: 特殊字符
  日期来源: 优先使用原始发布日期，否则使用获取日期
